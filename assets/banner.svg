<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C20" />
      <stop offset="50%" stop-color="#15102A" />
      <stop offset="100%" stop-color="#06040A" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF52C8" />
      <stop offset="50%" stop-color="#9C52FF" />
      <stop offset="100%" stop-color="#52D0FF" />
    </linearGradient>

    <!-- Node Gradient -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9C52FF" />
      <stop offset="100%" stop-color="#FF52C8" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="15" />

  <!-- Decorative Abstract Grid / Tech Circles -->
  <g opacity="0.15">
    <circle cx="950" cy="200" r="160" stroke="#9C52FF" stroke-width="1.5" fill="none" />
    <circle cx="950" cy="200" r="120" stroke="#FF52C8" stroke-width="1.5" stroke-dasharray="10 5" fill="none" />
    <circle cx="950" cy="200" r="80" stroke="#52D0FF" stroke-width="2" fill="none" />
  </g>

  <!-- Network / Model Visual Representation (Neural Net/Interpretability Nodes) -->
  <g opacity="0.85">
    <!-- Connections -->
    <line x1="850" y1="120" x2="950" y2="120" stroke="#9C52FF" stroke-width="2" stroke-dasharray="5 5" />
    <line x1="850" y1="120" x2="950" y2="200" stroke="#9C52FF" stroke-width="2" />
    <line x1="850" y1="200" x2="950" y2="120" stroke="#52D0FF" stroke-width="2" />
    <line x1="850" y1="200" x2="950" y2="200" stroke="#52D0FF" stroke-width="2" stroke-dasharray="5 5" />
    <line x1="850" y1="200" x2="950" y2="280" stroke="#52D0FF" stroke-width="2" />
    <line x1="850" y1="280" x2="950" y2="200" stroke="#FF52C8" stroke-width="2" />
    <line x1="850" y1="280" x2="950" y2="280" stroke="#FF52C8" stroke-width="2" stroke-dasharray="5 5" />

    <line x1="950" y1="120" x2="1050" y2="160" stroke="#FF52C8" stroke-width="3" />
    <line x1="950" y1="200" x2="1050" y2="160" stroke="#9C52FF" stroke-width="3" />
    <line x1="950" y1="200" x2="1050" y2="240" stroke="#52D0FF" stroke-width="3" />
    <line x1="950" y1="280" x2="1050" y2="240" stroke="#52D0FF" stroke-width="3" />

    <!-- Explainer / Glass Box Highlight -->
    <polygon points="900,80 1090,80 1090,320 900,320" fill="none" stroke="#52D0FF" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5" />
    <text x="1000" y="70" fill="#52D0FF" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">EXPLAINER LIMITS</text>

    <!-- Nodes (Input Layer) -->
    <circle cx="850" cy="120" r="10" fill="#0F0C20" stroke="#9C52FF" stroke-width="3" />
    <circle cx="850" cy="200" r="10" fill="#0F0C20" stroke="#52D0FF" stroke-width="3" />
    <circle cx="850" cy="280" r="10" fill="#0F0C20" stroke="#FF52C8" stroke-width="3" />

    <!-- Nodes (Hidden / Explainable Layer) -->
    <circle cx="950" cy="120" r="12" fill="#9C52FF" filter="url(#glow)" />
    <circle cx="950" cy="200" r="12" fill="#52D0FF" filter="url(#glow)" />
    <circle cx="950" cy="280" r="12" fill="#FF52C8" filter="url(#glow)" />

    <!-- Nodes (Output Layer) -->
    <circle cx="1050" cy="160" r="14" fill="#0F0C20" stroke="#52D0FF" stroke-width="4" />
    <circle cx="1050" cy="240" r="14" fill="#0F0C20" stroke="#FF52C8" stroke-width="4" />
  </g>

  <!-- Title & Subtitle -->
  <text x="80" y="170" fill="url(#textGrad)" font-family="'Outfit', 'Segoe UI', Roboto, sans-serif" font-size="54" font-weight="900" letter-spacing="-1">Explainable AI (XAI)</text>
  <text x="80" y="230" fill="#FFFFFF" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="28" opacity="0.9">Landscape, Methods &amp; Real-World Examples</text>
  
  <rect x="80" y="260" width="380" height="4" fill="url(#textGrad)" rx="2" />
  
  <text x="80" y="300" fill="#8C88A5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" letter-spacing="1">DEMISTIFYING MACHINE LEARNING FOR TRUSTWORTHY DECISIONS</text>
</svg>
